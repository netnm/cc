<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CGPA Calculator</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial;
      background: whitesmoke;
    }

    .container {
      width: 400px;
      margin: 80px auto;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      border: 1px solid lightgray;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid gray;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: royalblue;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    h2 {
      text-align: center;
      margin-top: 20px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="card">

      <h1>CGPA Calculator</h1>

      <label>Subject 1 Credits</label>
      <input type="number" id="c1">

      <label>Subject 1 Grade Point</label>
      <input type="number" id="g1">

      <label>Subject 2 Credits</label>
      <input type="number" id="c2">

      <label>Subject 2 Grade Point</label>
      <input type="number" id="g2">

      <label>Subject 3 Credits</label>
      <input type="number" id="c3">

      <label>Subject 3 Grade Point</label>
      <input type="number" id="g3">

      <button onclick="calculateCGPA()">
        Calculate CGPA
      </button>

      <h2 id="result">
        CGPA: 0
      </h2>

    </div>

  </div>

  <script>

    function calculateCGPA() {

      // Get input values
      let c1 = Number(document.getElementById("c1").value);
      let g1 = Number(document.getElementById("g1").value);

      let c2 = Number(document.getElementById("c2").value);
      let g2 = Number(document.getElementById("g2").value);

      let c3 = Number(document.getElementById("c3").value);
      let g3 = Number(document.getElementById("g3").value);

      // Total credits
      let totalCredits =
        c1 + c2 + c3;

      // Total grade points
      let totalPoints =
        (c1 * g1) +
        (c2 * g2) +
        (c3 * g3);

      // CGPA formula
      let cgpa =
        totalPoints / totalCredits;

      // Display result
      document.getElementById("result").innerHTML =
        "CGPA: " + cgpa.toFixed(2);
    }

  </script>

</body>
</html>
